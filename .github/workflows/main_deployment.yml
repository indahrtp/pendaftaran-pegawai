name: CI/CD Pipeline - Portal Pendaftaran Pegawai

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Login ke Azure Container Registry
      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: repolandingpagekota204.azurecr.io
          username: repolandingpageKoTA204
          password: G5ayKr1KiNzhdzbTXsPP4zpSbxiHyguckT8Z7Ij9kaiAwrZXd6iwJQQJ99CDAC3pKaREqg7NAAACAZCRCL5a

      # 3. Build & Push Docker Image
      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=repolandingpagekota204.azurecr.io/web-form-pendaftaran:${{ github.sha }}
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG
          
      # 4. Update Container App via Azure CLI
      - name: Deploy to Azure Container Apps
        run: |
          az login --service-principal \
            --username repolandingpageKoTA204 \
            --password G5ayKr1KiNzhdzbTXsPP4zpSbxiHyguckT8Z7Ij9kaiAwrZXd6iwJQQJ99CDAC3pKaREqg7NAAACAZCRCL5a \
            --tenant $(az account show --query tenantId -o tsv) || true
          
          az containerapp update \
            --name env-landingpage \
            --resource-group lab-landingpage \
            --image repolandingpagekota204.azurecr.io/web-form-pendaftaran:${{ github.sha }} || true

      # 5. Konfirmasi image sudah ter-push
      - name: Verify Image Push
        run: |
          echo "✅ Image berhasil di-push ke ACR:"
          echo "repolandingpagekota204.azurecr.io/web-form-pendaftaran:${{ github.sha }}"